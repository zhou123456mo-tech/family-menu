# Cloudflare Pages 配置文件
# 文档: https://developers.cloudflare.com/pages/functions/writing-functions/

name = "home-menu"
compatibility_date = "2024-01-01"

# 构建输出目录
pages_build_output_dir = ".vercel/output/static"

[build]
command = "npx @cloudflare/next-on-pages"

[build.environment]
NODE_VERSION = "20"

# D1 数据库绑定（需要先在 Cloudflare Dashboard 创建）
# [[d1_databases]]
# binding = "DB"
# database_name = "home-menu-db"
# database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# 环境变量
# [vars]
# NEXTAUTH_SECRET = "your-production-secret"
# NEXTAUTH_URL = "https://home-menu.pages.dev"
